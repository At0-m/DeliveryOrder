services:
  postgres:
    image: postgres:16-alpine
    container_name: delivery-order-postgres
    environment:
      POSTGRES_DB: delivery_order
      POSTGRES_USER: delivery_order
      POSTGRES_PASSWORD: delivery_order
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery_order -d delivery_order"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/DeliveryOrder.Api/Dockerfile
    container_name: delivery-order-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=delivery_order;Username=delivery_order;Password=delivery_order
      Cors__AllowedOrigins__0: http://localhost:3000
      Cors__AllowedOrigins__1: http://localhost:5173
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: delivery-order-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres-data:
